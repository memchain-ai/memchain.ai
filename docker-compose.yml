#version: "3.0"

services:

  ##################################################################################
  # Dozzle for logs
  # https://localhost:9999
  ##################################################################################
  dozzle:
    container_name: dozzle
    image: amir20/dozzle:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - ${PORT_DOZZLE}:8080

  ##################################################################################
  # Grahayatra
  # https://localhost:8989
  # Make sure the volume path is valid
  ##################################################################################
  grahayatra:
    image: nginx
    container_name: grahayatra
    volumes:
      - c:/containers/grahayatra:/usr/share/nginx/html
    restart: unless-stopped
    ports:
      - "8989:80"

  ##################################################################################
  # Lekhini
  # https://localhost:7979
  # Make sure the volume path is valid
  ##################################################################################
  lekhini:
    image: nginx
    container_name: lekhini
    volumes:
      - C:/containers/lekhini:/usr/share/nginx/html
    restart: unless-stopped
    ports:
      - "7979:80"

